<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;

</head>

<body>

<h1>Word Embedding Arithmetic</h1>

<div class="section">
  <div>Model</div>
  <div id="modelGrid"></div>
</div>

<div class="section">
  <div>A − B + C</div>
  <input id="wordA" value="queen">
  <input id="wordB" value="woman">
  <input id="wordC" value="man">
</div>

<div class="section">
  <div>Targets</div>
  <div id="chipWrap">
    <input id="targetInput" placeholder="단어 입력 후 Enter">
  </div>

  <button onclick="window._runCompute()">Compute</button>
  <button onclick="window._loadExample1()">Example 1</button>
  <button onclick="window._loadExample2()">Example 2</button>
  <button onclick="window._loadExample3()">Example 3</button>

  <div class="status-bar" id="statusBar"></div>
</div>

<div class="section" id="resultsSection" style="display:none">
  <div id="resultsContainer"></div>
</div>

<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

env.allowLocalModels = false;

const MODELS = [
  { id:'all-MiniLM-L6-v2', hf:'Xenova/all-MiniLM-L6-v2', name:'MiniLM' },
  { id:'all-mpnet-base-v2', hf:'Xenova/all-mpnet-base-v2', name:'MPNet' },
  { id:'paraphrase-multilingual-MiniLM-L12-v2', hf:'Xenova/paraphrase-multilingual-MiniLM-L12-v2', name:'Multilingual' },
  { id:'LaBSE', hf:'Xenova/LaBSE', name:'LaBSE' }
];

let selectedModelId = 'all-MiniLM-L6-v2';
let loadedModels = {};

function buildModelGrid(){
  const grid=document.getElementById('modelGrid');
  MODELS.forEach(m=>{
    const div=document.createElement('div');
    div.className='model-option';
    div.textContent=m.name;
    div.onclick=()=>{
      selectedModelId=m.id;
      document.querySelectorAll('.model-option').forEach(el=>el.classList.remove('selected'));
      div.classList.add('selected');
    };
    grid.appendChild(div);
  });
}
buildModelGrid();

async function getExtractor(id){
  if(loadedModels[id]) return loadedModels[id];
  document.getElementById('statusBar').textContent="모델 로딩...";
  const ext=await pipeline('feature-extraction', MODELS.find(m=>m.id===id).hf);
  loadedModels[id]=ext;
  document.getElementById('statusBar').textContent="완료";
  return ext;
}

function cosine(a,b){
  let d=0,na=0,nb=0;
  for(let i=0;i<a.length;i++){
    d+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i];
  }
  return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-8);
}

function vec(a,b,c){
  let r=new Float32Array(a.length);
  for(let i=0;i<a.length;i++) r[i]=a[i]-b[i]+c[i];
  return r;
}

async function encode(ext,t){
  const o=await ext(t,{pooling:'mean',normalize:true});
  return o.data;
}

window._runCompute=async function(){
  const A=document.getElementById('wordA').value;
  const B=document.getElementById('wordB').value;
  const C=document.getElementById('wordC').value;

  const ext=await getExtractor(selectedModelId);

  const a=await encode(ext,A);
  const b=await encode(ext,B);
  const c=await encode(ext,C);

  const q=vec(a,b,c);

  let res=[];
  const chips=document.querySelectorAll('.chip');

  for (let i = 0; i < chips.length; i++) {
    const w = chips[i].childNodes[0].nodeValue.trim();
    const e = await encode(ext,w);
    res.push({word:w,score:cosine(q,e)});
  }

  show(res);
};

function show(res){
  res.sort((a,b)=>b.score-a.score);
  const box=document.getElementById('resultsContainer');
  box.innerHTML='';
  res.forEach(r=>{
    const d=document.createElement('div');
    d.className='result-item';
    d.textContent=`${r.word} : ${r.score.toFixed(4)}`;
    box.appendChild(d);
  });
  document.getElementById('resultsSection').style.display='block';
}

const wrap=document.getElementById('chipWrap');
const input=document.getElementById('targetInput');

input.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const v=input.value.trim();
    if(!v)return;

    const chip=document.createElement('span');
    chip.className='chip';

    chip.innerHTML=`${v} <button>×</button>`;
    chip.querySelector('button').onclick=()=>chip.remove();

    wrap.insertBefore(chip,input);
    input.value='';
  }

  if(e.key==='Backspace' && input.value===''){
    const chips=document.querySelectorAll('.chip');
    if(chips.length>0) chips[chips.length-1].remove();
  }
});

window._loadExample1=()=>{
  document.getElementById('wordA').value='queen';
  document.getElementById('wordB').value='woman';
  document.getElementById('wordC').value='man';
};

window._loadExample2=()=>{
  document.getElementById('wordA').value='Paris';
  document.getElementById('wordB').value='France';
  document.getElementById('wordC').value='Germany';
};

window._loadExample3=()=>{
  document.getElementById('wordA').value='왕비';
  document.getElementById('wordB').value='여자';
  document.getElementById('wordC').value='남자';
};
</script>

</body>
</html>
